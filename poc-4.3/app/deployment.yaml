apiVersion: apps/v1
kind: Deployment
metadata:
  name: noc-assistant
  namespace: llama-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: noc-assistant
  template:
    metadata:
      labels:
        app: noc-assistant
    spec:
      containers:
        - name: gradio
          image: image-registry.openshift-image-registry.svc:5000/llama-stack/noc-assistant:latest
          env:
            - name: LLAMASTACK_URL
              value: "http://lsd-granite-milvus-inline-service.llama-stack.svc.cluster.local:8321"
            - name: MCP_SERVER_URL
              value: "http://openshift-mcp-server.mcp-system.svc.cluster.local:8001/mcp"
            - name: MODEL_ID
              value: "vllm-inference/Qwen3.6-35B-A3B"
          ports:
            - containerPort: 7860
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 7860
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 7860
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: noc-assistant
  namespace: llama-stack
spec:
  selector:
    app: noc-assistant
  ports:
    - port: 7860
      targetPort: 7860
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: noc-assistant
  namespace: llama-stack
  annotations:
    haproxy.router.openshift.io/timeout: 600s
spec:
  port:
    targetPort: 7860
  to:
    kind: Service
    name: noc-assistant
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

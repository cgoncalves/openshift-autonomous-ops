<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 500" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="13">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#444"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#0066CC"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#3E8635"/></marker>
  </defs>

  <rect width="750" height="500" rx="12" fill="#FAFAFA"/>
  <text x="375" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1A1A1A">PoC 4.3 — NOC Assistant: Conversation Flow</text>

  <!-- Step 1 -->
  <circle cx="80" cy="85" r="16" fill="#0066CC"/>
  <text x="80" y="90" text-anchor="middle" fill="white" font-weight="700">1</text>
  <rect x="110" y="70" width="600" height="45" rx="8" fill="#E3F2FD" stroke="#0066CC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="92" fill="#0D47A1" font-weight="600">Operator:</text>
  <text x="210" y="92" fill="#333">"What's the health of the cluster right now?"</text>
  <text x="130" y="108" fill="#0066CC" font-size="10">Natural language query via Gradio chat UI</text>

  <!-- Step 2 -->
  <circle cx="80" cy="150" r="16" fill="#6753AC"/>
  <text x="80" y="155" text-anchor="middle" fill="white" font-weight="700">2</text>
  <rect x="110" y="135" width="600" height="45" rx="8" fill="#F0E6FF" stroke="#6753AC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="157" fill="#4F3D8A" font-weight="600">LlamaStack → LLM:</text>
  <text x="280" y="157" fill="#333">Decides to call MCP tools (nodes_top, alertmanager_alerts)</text>
  <text x="130" y="173" fill="#6753AC" font-size="10">Responses API with MCP tool definitions</text>
  <line x1="410" y1="115" x2="410" y2="135" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <circle cx="80" cy="215" r="16" fill="#3E8635"/>
  <text x="80" y="220" text-anchor="middle" fill="white" font-weight="700">3</text>
  <rect x="110" y="200" width="600" height="45" rx="8" fill="#E8F5E3" stroke="#3E8635" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="222" fill="#2D6B27" font-weight="600">MCP Server:</text>
  <text x="240" y="222" fill="#333">Queries Kubernetes API → returns node metrics, active alerts</text>
  <text x="130" y="238" fill="#3E8635" font-size="10">nodes_top → CPU/Memory per node | alertmanager_alerts → firing alerts</text>
  <line x1="410" y1="180" x2="410" y2="200" stroke="#3E8635" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Step 4 -->
  <circle cx="80" cy="280" r="16" fill="#6753AC"/>
  <text x="80" y="285" text-anchor="middle" fill="white" font-weight="700">4</text>
  <rect x="110" y="265" width="600" height="45" rx="8" fill="#F0E6FF" stroke="#6753AC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="287" fill="#4F3D8A" font-weight="600">LLM synthesizes:</text>
  <text x="275" y="287" fill="#333">Combines tool results into human-readable response</text>
  <text x="130" y="303" fill="#6753AC" font-size="10">Formats with sections, bullet points, status indicators</text>
  <line x1="410" y1="245" x2="410" y2="265" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <circle cx="80" cy="345" r="16" fill="#0066CC"/>
  <text x="80" y="350" text-anchor="middle" fill="white" font-weight="700">5</text>
  <rect x="110" y="330" width="600" height="75" rx="8" fill="#E3F2FD" stroke="#0066CC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="352" fill="#0D47A1" font-weight="600">Assistant responds:</text>
  <text x="130" y="370" fill="#333" font-size="11">"5 nodes in the cluster. All healthy.</text>
  <text x="130" y="385" fill="#333" font-size="11">• Worker 1: CPU 9%, Memory 49% | Worker 2: CPU 3%, Memory 58%</text>
  <text x="130" y="400" fill="#333" font-size="11">• 1 alert active: AlertmanagerFailedToSendAlerts (warning)"</text>
  <line x1="410" y1="310" x2="410" y2="330" stroke="#0066CC" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Step 6: Follow-up -->
  <circle cx="80" cy="440" r="16" fill="#0066CC"/>
  <text x="80" y="445" text-anchor="middle" fill="white" font-weight="700">6</text>
  <rect x="110" y="425" width="600" height="45" rx="8" fill="#E3F2FD" stroke="#0066CC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="447" fill="#0D47A1" font-weight="600">Operator follow-up:</text>
  <text x="290" y="447" fill="#333">"Tell me more about that alert"</text>
  <text x="130" y="463" fill="#0066CC" font-size="10">Multi-turn conversation via previous_response_id</text>
  <line x1="410" y1="405" x2="410" y2="425" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Timing -->
  <text x="700" y="490" text-anchor="end" fill="#888" font-size="10">Response time: ~20-30s</text>
</svg>

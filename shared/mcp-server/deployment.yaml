apiVersion: v1
kind: Namespace
metadata:
  name: mcp-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-server
  namespace: mcp-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-server-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: mcp-server
    namespace: mcp-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openshift-mcp-server
  namespace: mcp-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openshift-mcp-server
  template:
    metadata:
      labels:
        app: openshift-mcp-server
    spec:
      serviceAccountName: mcp-server
      containers:
        - name: mcp-server
          image: registry.redhat.io/openshift-mcp-beta/openshift-mcp-server-rhel9:0.2
          command:
            - /openshift-mcp-server
          args:
            - "--port=8001"
            - "--toolsets=core,observability"
            - "--stateless"
          ports:
            - containerPort: 8001
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
---
apiVersion: v1
kind: Service
metadata:
  name: openshift-mcp-server
  namespace: mcp-system
spec:
  selector:
    app: openshift-mcp-server
  ports:
    - port: 8001
      targetPort: 8001
      name: sse
  type: ClusterIP

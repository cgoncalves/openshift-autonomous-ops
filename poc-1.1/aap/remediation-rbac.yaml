apiVersion: v1
kind: ServiceAccount
metadata:
  name: aap-node-remediation
  namespace: aap
---
apiVersion: v1
kind: Secret
metadata:
  name: aap-node-remediation-token
  namespace: aap
  annotations:
    kubernetes.io/service-account.name: aap-node-remediation
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aap-node-remediation
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["nodes/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aap-node-remediation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aap-node-remediation
subjects:
  - kind: ServiceAccount
    name: aap-node-remediation
    namespace: aap

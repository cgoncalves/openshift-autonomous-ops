apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-healing-agent
  namespace: llama-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: self-healing-agent
  template:
    metadata:
      labels:
        app: self-healing-agent
    spec:
      containers:
        - name: agent
          image: image-registry.openshift-image-registry.svc:5000/llama-stack/self-healing-agent:latest
          env:
            - name: LLAMASTACK_URL
              value: "http://lsd-granite-milvus-inline-service.llama-stack.svc.cluster.local:8321"
            - name: MCP_SERVER_URL
              value: "http://openshift-mcp-server.mcp-system.svc.cluster.local:8001/mcp"
            - name: AAP_URL
              value: "https://aap-aap.apps.cnfdc6.t5g-dev.eng.rdu2.dc.redhat.com"
            - name: AAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aap-token
                  key: token
                  optional: true
            - name: MODEL_ID
              value: "vllm-inference/Qwen3.6-35B-A3B"
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: self-healing-agent
  namespace: llama-stack
spec:
  selector:
    app: self-healing-agent
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP

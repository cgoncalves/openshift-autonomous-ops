apiVersion: v1
kind: Namespace
metadata:
  name: poc-1-2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: poc-1-2
  labels:
    app: sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: sample-app
          image: image-registry.openshift-image-registry.svc:5000/poc-1-2/sample-app:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: poc-1-2
  labels:
    app: sample-app
spec:
  selector:
    app: sample-app
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sample-app
  namespace: poc-1-2
  labels:
    app: sample-app
spec:
  selector:
    matchLabels:
      app: sample-app
  endpoints:
    - port: "8080"
      path: /metrics
      interval: 10s

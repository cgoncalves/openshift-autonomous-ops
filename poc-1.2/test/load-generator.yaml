apiVersion: batch/v1
kind: Job
metadata:
  name: load-generator
  namespace: poc-1-2
spec:
  template:
    spec:
      containers:
        - name: load
          image: registry.access.redhat.com/ubi9/python-312:latest
          command:
            - python3
            - -c
            - |
              import urllib.request
              import concurrent.futures
              import time
              import sys

              URL = "http://sample-app.poc-1-2.svc:8080/api/data"
              CONCURRENCY = 80
              DURATION = 300

              def make_request(_):
                  try:
                      urllib.request.urlopen(URL, timeout=5)
                      return True
                  except Exception:
                      return False

              print(f"Generating load: {CONCURRENCY} concurrent requests for {DURATION}s", flush=True)
              end = time.time() + DURATION
              total = 0
              with concurrent.futures.ThreadPoolExecutor(max_workers=CONCURRENCY) as executor:
                  while time.time() < end:
                      futures = [executor.submit(make_request, i) for i in range(CONCURRENCY)]
                      concurrent.futures.wait(futures)
                      total += CONCURRENCY
                      if total % 500 == 0:
                          print(f"  Sent {total} requests...", flush=True)
              print(f"Done. Total requests: {total}", flush=True)
      restartPolicy: Never
  backoffLimit: 0

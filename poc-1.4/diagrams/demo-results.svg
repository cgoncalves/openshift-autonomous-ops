<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="'Segoe UI',Roboto,Arial,sans-serif">
  <defs>
    <style>
      .axis-line { stroke: #d4d4d4; stroke-width: 1; }
      .grid-line { stroke: #e8e8e8; stroke-width: 0.5; }
      .label { font-size: 11px; fill: #52514e; }
      .title { font-size: 14px; fill: #0b0b0b; font-weight: 600; }
      .subtitle { font-size: 11px; fill: #52514e; }
      .value-label { font-size: 10px; fill: #52514e; }
      .phase-label { font-size: 10px; font-weight: 600; }
      .annotation { font-size: 10px; fill: #52514e; font-style: italic; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1000" height="620" fill="#fcfcfb" rx="8"/>

  <!-- Title -->
  <text x="70" y="30" class="title">PoC 1.4 — End-to-End Demo: Full Lifecycle with Escalation</text>
  <text x="70" y="48" class="subtitle">AI configures at design time → HPA handles runtime → AI re-analyzes on escalation → updated config stabilizes</text>

  <!-- Phase timeline bar (top) -->
  <rect x="70" y="60" width="80" height="20" rx="3" fill="#6753AC" opacity="0.15"/>
  <text x="110" y="74" text-anchor="middle" class="phase-label" fill="#4F3D8A" font-size="9">Design</text>

  <rect x="150" y="60" width="30" height="20" rx="3" fill="#0066CC" opacity="0.15"/>
  <text x="165" y="74" text-anchor="middle" class="phase-label" fill="#0066CC" font-size="8">OK</text>

  <rect x="180" y="60" width="280" height="20" rx="3" fill="#3E8635" opacity="0.15"/>
  <text x="320" y="74" text-anchor="middle" class="phase-label" fill="#2D6B27">Runtime (No LLM)</text>

  <rect x="460" y="60" width="120" height="20" rx="3" fill="#CC0000" opacity="0.15"/>
  <text x="520" y="74" text-anchor="middle" class="phase-label" fill="#CC0000">Degraded</text>

  <rect x="580" y="60" width="70" height="20" rx="3" fill="#6753AC" opacity="0.15"/>
  <text x="615" y="74" text-anchor="middle" class="phase-label" fill="#4F3D8A" font-size="9">Escalation</text>

  <rect x="650" y="60" width="40" height="20" rx="3" fill="#0066CC" opacity="0.15"/>
  <text x="670" y="74" text-anchor="middle" class="phase-label" fill="#0066CC" font-size="8">OK</text>

  <rect x="690" y="60" width="240" height="20" rx="3" fill="#3E8635" opacity="0.15"/>
  <text x="810" y="74" text-anchor="middle" class="phase-label" fill="#2D6B27">Runtime with Updated Config</text>

  <!-- ============================================ -->
  <!-- Chart 1: CPU Utilization -->
  <!-- ============================================ -->
  <text x="70" y="108" class="title" font-size="12">CPU Utilization (%)</text>
  <circle cx="210" cy="108" r="4" fill="#2a78d6"/>
  <text x="218" y="112" class="value-label" fill="#2a78d6">CPU %</text>

  <!-- Y axis -->
  <line x1="70" y1="115" x2="70" y2="240" class="axis-line"/>
  <text x="62" y="120" text-anchor="end" class="value-label">300</text>
  <text x="62" y="153" text-anchor="end" class="value-label">200</text>
  <text x="62" y="186" text-anchor="end" class="value-label">100</text>
  <text x="62" y="228" text-anchor="end" class="value-label">0</text>

  <!-- Grid -->
  <line x1="70" y1="120" x2="930" y2="120" class="grid-line"/>
  <line x1="70" y1="153" x2="930" y2="153" class="grid-line"/>
  <line x1="70" y1="186" x2="930" y2="186" class="grid-line"/>

  <!-- HPA target lines -->
  <line x1="70" y1="200" x2="650" y2="200" stroke="#CC0000" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <text x="500" y="197" class="value-label" fill="#CC0000" font-size="9">HPA target 60%</text>
  <!-- After escalation: new target 70% -->
  <line x1="690" y1="195" x2="930" y2="195" stroke="#3E8635" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <text x="830" y="192" class="value-label" fill="#3E8635" font-size="9">New target 70%</text>

  <!-- CPU data pre-escalation: 0,0,274,249,246,244,240,237,233,227,139,91,88,88 -->
  <polyline points="
    70,228 110,228 150,228
    180,228 210,115 240,135 270,137 300,139 330,141
    360,143 390,144 420,147 450,151 480,172
    510,188 540,191 570,191 600,191 630,191
  " fill="none" stroke="#2a78d6" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- CPU data post-escalation: drops as new limits take effect -->
  <!-- With CPU limits 200m→500m, each pod has 2.5x more capacity -->
  <!-- CPU % drops from 88% to ~55% with same load -->
  <polyline points="
    690,191 720,182 750,196 780,198 810,199 840,199 870,207 900,215 930,228
  " fill="none" stroke="#2a78d6" stroke-width="2.5" stroke-linejoin="round" stroke-dasharray="none"/>

  <!-- Transition gap -->
  <line x1="630" y1="191" x2="690" y2="191" stroke="#2a78d6" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.4"/>

  <!-- Peak annotation -->
  <text x="215" y="110" class="annotation" fill="#2a78d6">274%</text>
  <text x="545" y="186" class="annotation" fill="#2a78d6">88%</text>
  <text x="810" y="195" class="annotation" fill="#2a78d6">55%</text>

  <!-- ============================================ -->
  <!-- Chart 2: Replicas -->
  <!-- ============================================ -->
  <text x="70" y="275" class="title" font-size="12">Replicas</text>
  <circle cx="130" cy="275" r="4" fill="#d4652f"/>
  <text x="138" y="279" class="value-label" fill="#d4652f">Replicas</text>

  <!-- Y axis -->
  <line x1="70" y1="282" x2="70" y2="390" class="axis-line"/>
  <text x="62" y="287" text-anchor="end" class="value-label">10</text>
  <text x="62" y="309" text-anchor="end" class="value-label">8</text>
  <text x="62" y="331" text-anchor="end" class="value-label">6</text>
  <text x="62" y="353" text-anchor="end" class="value-label">4</text>
  <text x="62" y="375" text-anchor="end" class="value-label">2</text>

  <!-- Grid -->
  <line x1="70" y1="287" x2="930" y2="287" class="grid-line"/>
  <line x1="70" y1="309" x2="930" y2="309" class="grid-line"/>
  <line x1="70" y1="331" x2="930" y2="331" class="grid-line"/>
  <line x1="70" y1="353" x2="930" y2="353" class="grid-line"/>
  <line x1="70" y1="375" x2="930" y2="375" class="grid-line"/>

  <!-- Max replicas line -->
  <line x1="70" y1="287" x2="930" y2="287" stroke="#CC0000" stroke-width="1" stroke-dasharray="4 3" opacity="0.3"/>
  <text x="935" y="291" class="value-label" fill="#CC0000" font-size="9">max</text>

  <!-- Replica data pre-escalation: 1→2→4→6→8→10 then stays at 10 -->
  <polyline points="
    70,386 150,386 150,375
    180,375 210,375 210,353 240,353 240,331
    270,331 270,309 300,309 300,287
    330,287 360,287 390,287 420,287 450,287
    480,287 510,287 540,287 570,287 600,287 630,287
  " fill="none" stroke="#d4652f" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Transition gap -->
  <line x1="630" y1="287" x2="690" y2="287" stroke="#d4652f" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.4"/>

  <!-- Post-escalation: with higher CPU limits, fewer replicas needed -->
  <!-- HPA scales down from 10 → 6 as CPU per pod drops -->
  <polyline points="
    690,287 720,287 750,287 780,309 810,331 840,331 870,331 900,331 930,331
  " fill="none" stroke="#d4652f" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Annotations -->
  <text x="215" y="350" class="annotation" fill="#d4652f">2→4</text>
  <text x="305" y="283" class="annotation" fill="#d4652f">max (10)</text>
  <text x="815" y="327" class="annotation" fill="#d4652f">→6</text>

  <!-- ============================================ -->
  <!-- Chart 3: Intent Phase -->
  <!-- ============================================ -->
  <text x="70" y="425" class="title" font-size="12">Intent Phase</text>

  <!-- Phase bars -->
  <rect x="70" y="432" width="80" height="22" rx="4" fill="#6753AC"/>
  <text x="110" y="447" text-anchor="middle" fill="white" font-size="10" font-weight="500">Analyzing</text>

  <rect x="150" y="432" width="30" height="22" rx="4" fill="#EC7A08"/>
  <text x="165" y="447" text-anchor="middle" fill="white" font-size="8" font-weight="500">Pend</text>

  <rect x="180" y="432" width="100" height="22" rx="4" fill="#3E8635"/>
  <text x="230" y="447" text-anchor="middle" fill="white" font-size="10" font-weight="500">Fulfilled</text>

  <rect x="280" y="432" width="180" height="22" rx="4" fill="#0066CC"/>
  <text x="370" y="447" text-anchor="middle" fill="white" font-size="10" font-weight="500">Adapting (HPA scaling)</text>

  <rect x="460" y="432" width="120" height="22" rx="4" fill="#CC0000"/>
  <text x="520" y="447" text-anchor="middle" fill="white" font-size="10" font-weight="500">Degraded (90s)</text>

  <rect x="580" y="432" width="70" height="22" rx="4" fill="#6753AC"/>
  <text x="615" y="447" text-anchor="middle" fill="white" font-size="9" font-weight="500">Analyzing</text>

  <rect x="650" y="432" width="40" height="22" rx="4" fill="#EC7A08"/>
  <text x="670" y="447" text-anchor="middle" fill="white" font-size="8" font-weight="500">Pend</text>

  <rect x="690" y="432" width="70" height="22" rx="4" fill="#0066CC"/>
  <text x="725" y="447" text-anchor="middle" fill="white" font-size="9" font-weight="500">Adapting</text>

  <rect x="760" y="432" width="170" height="22" rx="4" fill="#3E8635"/>
  <text x="845" y="447" text-anchor="middle" fill="white" font-size="10" font-weight="500">Fulfilled ✓</text>

  <!-- Time axis -->
  <line x1="70" y1="465" x2="930" y2="465" class="axis-line"/>
  <text x="70" y="480" text-anchor="middle" class="value-label">0s</text>
  <text x="180" y="480" text-anchor="middle" class="value-label">60s</text>
  <text x="290" y="480" text-anchor="middle" class="value-label">120s</text>
  <text x="400" y="480" text-anchor="middle" class="value-label">180s</text>
  <text x="510" y="480" text-anchor="middle" class="value-label">240s</text>
  <text x="620" y="480" text-anchor="middle" class="value-label">300s</text>
  <text x="730" y="480" text-anchor="middle" class="value-label">360s</text>
  <text x="840" y="480" text-anchor="middle" class="value-label">420s</text>
  <text x="930" y="480" text-anchor="middle" class="value-label">480s</text>

  <!-- Vertical event markers -->
  <line x1="70" y1="90" x2="70" y2="465" stroke="#6753AC" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
  <line x1="160" y1="90" x2="160" y2="465" stroke="#0066CC" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
  <line x1="180" y1="90" x2="180" y2="465" stroke="#666" stroke-width="1" stroke-dasharray="3 3" opacity="0.2"/>
  <line x1="460" y1="90" x2="460" y2="465" stroke="#CC0000" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
  <line x1="580" y1="90" x2="580" y2="465" stroke="#6753AC" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
  <line x1="665" y1="90" x2="665" y2="465" stroke="#0066CC" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>

  <!-- Event annotations -->
  <text x="70" y="498" text-anchor="middle" class="annotation" fill="#6753AC">LLM #1</text>
  <text x="160" y="508" text-anchor="middle" class="annotation" fill="#0066CC">Approve</text>
  <text x="180" y="498" text-anchor="middle" class="annotation">Load ▶</text>
  <text x="460" y="508" text-anchor="middle" class="annotation" fill="#CC0000">HPA at max</text>
  <text x="580" y="498" text-anchor="middle" class="annotation" fill="#6753AC">LLM #2</text>
  <text x="665" y="508" text-anchor="middle" class="annotation" fill="#0066CC">Approve</text>

  <!-- Summary box -->
  <rect x="70" y="525" width="860" height="75" rx="6" fill="#f5f5f5" stroke="#d4d4d4" stroke-width="1"/>
  <text x="85" y="545" font-size="11" fill="#0b0b0b" font-weight="600">Summary</text>
  <text x="85" y="562" font-size="10" fill="#52514e">LLM called 2x (design time only) — never in the runtime scaling loop</text>
  <text x="85" y="576" font-size="10" fill="#52514e">Initial config: HPA (min=2, max=10, CPU 60%) + PDB + resource patches → HPA scaled to max but SLA still at risk</text>
  <text x="85" y="590" font-size="10" fill="#52514e">Escalation: AI recommended CPU limits ↑25%, pod anti-affinity, HPA behavior tuning → CPU dropped 88%→55%, replicas 10→6, Fulfilled ✓</text>
</svg>

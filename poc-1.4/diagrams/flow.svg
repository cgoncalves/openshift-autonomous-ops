<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 880" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="13">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#444"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#3E8635"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#0066CC"/></marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#CC0000"/></marker>
  </defs>

  <rect width="850" height="880" rx="12" fill="#FAFAFA"/>
  <text x="425" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1A1A1A">PoC 1.4 — AI-Assisted Intent Configuration: Flow</text>

  <!-- Phase labels -->
  <rect x="720" y="60" width="100" height="22" rx="4" fill="#6753AC" opacity="0.15"/>
  <text x="770" y="75" text-anchor="middle" fill="#4F3D8A" font-weight="600" font-size="11">DESIGN TIME</text>
  <rect x="720" y="370" width="100" height="22" rx="4" fill="#3E8635" opacity="0.15"/>
  <text x="770" y="385" text-anchor="middle" fill="#2D6B27" font-weight="600" font-size="11">RUNTIME</text>
  <rect x="720" y="560" width="100" height="22" rx="4" fill="#CC0000" opacity="0.15"/>
  <text x="770" y="575" text-anchor="middle" fill="#CC0000" font-weight="600" font-size="11">ESCALATION</text>

  <!-- Step 1: Create intent -->
  <circle cx="80" cy="80" r="16" fill="#6753AC"/>
  <text x="80" y="85" text-anchor="middle" fill="white" font-weight="700">1</text>
  <rect x="110" y="65" width="590" height="42" rx="8" fill="#F0E6FF" stroke="#6753AC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="85" fill="#4F3D8A" font-weight="600">Operator creates ApplicationIntent</text>
  <text x="130" y="100" fill="#6753AC" font-size="11">"p99 latency under 50ms, availability 99.9%, max 10 replicas"</text>

  <line x1="400" y1="107" x2="400" y2="127" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: AI analyzes -->
  <circle cx="80" cy="150" r="16" fill="#6753AC"/>
  <text x="80" y="155" text-anchor="middle" fill="white" font-weight="700">2</text>
  <rect x="110" y="135" width="590" height="50" rx="8" fill="#F0E6FF" stroke="#6753AC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="157" fill="#4F3D8A" font-weight="600">Controller calls LLM (~30s)</text>
  <text x="130" y="173" fill="#6753AC" font-size="11">Analyzes deployment spec + objectives + constraints → generates K8s manifests</text>

  <line x1="400" y1="185" x2="400" y2="205" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Recommendation stored -->
  <circle cx="80" cy="225" r="16" fill="#6753AC"/>
  <text x="80" y="230" text-anchor="middle" fill="white" font-weight="700">3</text>
  <rect x="110" y="210" width="590" height="50" rx="8" fill="#F0E6FF" stroke="#6753AC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="232" fill="#4F3D8A" font-weight="600">Recommendation stored — PendingApproval</text>
  <text x="130" y="248" fill="#6753AC" font-size="11">HPA (min=2, max=10, CPU=60%) • PDB (minAvailable=1) • Resource patches (CPU ↑)</text>

  <line x1="400" y1="260" x2="400" y2="280" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Approval -->
  <circle cx="80" cy="300" r="16" fill="#0066CC"/>
  <text x="80" y="305" text-anchor="middle" fill="white" font-weight="700">4</text>
  <rect x="110" y="285" width="590" height="40" rx="8" fill="#E3F2FD" stroke="#0066CC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="310" fill="#0D47A1" font-weight="600">Operator reviews and approves</text>

  <line x1="400" y1="325" x2="400" y2="345" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Resources applied -->
  <circle cx="80" cy="365" r="16" fill="#3E8635"/>
  <text x="80" y="370" text-anchor="middle" fill="white" font-weight="700">5</text>
  <rect x="110" y="350" width="590" height="42" rx="8" fill="#E8F5E3" stroke="#3E8635" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="370" fill="#2D6B27" font-weight="600">Resources applied → HPA + PDB created, Deployment patched</text>
  <text x="130" y="386" fill="#3E8635" font-size="10">Phase: Active → standard K8s controllers take over</text>

  <line x1="400" y1="392" x2="400" y2="412" stroke="#3E8635" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 6: Runtime -->
  <circle cx="80" cy="435" r="16" fill="#3E8635"/>
  <text x="80" y="440" text-anchor="middle" fill="white" font-weight="700">6</text>
  <rect x="110" y="420" width="590" height="42" rx="8" fill="#E8F5E3" stroke="#3E8635" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="440" fill="#2D6B27" font-weight="600">Runtime — No LLM</text>
  <text x="130" y="456" fill="#3E8635" font-size="11">HPA scales replicas based on CPU. Controller monitors fulfillment state.</text>

  <line x1="400" y1="462" x2="400" y2="482" stroke="#3E8635" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Step 7: Fork - Fulfilled or Degraded -->
  <circle cx="80" cy="505" r="16" fill="#3E8635"/>
  <text x="80" y="510" text-anchor="middle" fill="white" font-weight="700">7</text>

  <!-- Fulfilled path -->
  <rect x="110" y="490" width="250" height="35" rx="8" fill="#E8F5E3" stroke="#3E8635" stroke-width="2" filter="url(#shadow)"/>
  <text x="235" y="512" text-anchor="middle" fill="#2D6B27" font-weight="700">Fulfilled ✓</text>

  <!-- Degraded path -->
  <rect x="420" y="490" width="280" height="35" rx="8" fill="#FFEBEE" stroke="#CC0000" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="560" y="512" text-anchor="middle" fill="#B71C1C" font-weight="600">Degraded > 90s (HPA at max)</text>

  <!-- Phase separator -->
  <line x1="40" y1="340" x2="810" y2="340" stroke="#999" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- ============================================ -->
  <!-- ESCALATION LOOP -->
  <!-- ============================================ -->

  <line x1="560" y1="525" x2="560" y2="555" stroke="#CC0000" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Step 8: Re-analysis -->
  <circle cx="80" cy="578" r="16" fill="#CC0000"/>
  <text x="80" y="583" text-anchor="middle" fill="white" font-weight="700">8</text>
  <rect x="110" y="563" width="590" height="50" rx="8" fill="#FFEBEE" stroke="#CC0000" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="585" fill="#B71C1C" font-weight="600">Controller re-invokes LLM with runtime context</text>
  <text x="130" y="601" fill="#CC0000" font-size="11">"HPA at 10/10 replicas, CPU 163%, current limits 200m — previous strategy insufficient"</text>

  <line x1="400" y1="613" x2="400" y2="633" stroke="#CC0000" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- Step 9: Updated recommendation -->
  <circle cx="80" cy="655" r="16" fill="#6753AC"/>
  <text x="80" y="660" text-anchor="middle" fill="white" font-weight="700">9</text>
  <rect x="110" y="640" width="590" height="50" rx="8" fill="#F0E6FF" stroke="#6753AC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="662" fill="#4F3D8A" font-weight="600">Updated recommendation — PendingApproval</text>
  <text x="130" y="678" fill="#6753AC" font-size="11">CPU limits ↑25% • Pod anti-affinity added • HPA behavior tuning • minReplicas ↑</text>

  <line x1="400" y1="690" x2="400" y2="710" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 10: Re-approval -->
  <circle cx="80" cy="730" r="16" fill="#0066CC"/>
  <text x="80" y="735" text-anchor="middle" fill="white" font-weight="700">10</text>
  <rect x="110" y="715" width="590" height="40" rx="8" fill="#E3F2FD" stroke="#0066CC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="740" fill="#0D47A1" font-weight="600">Operator reviews and approves updated recommendation</text>

  <line x1="400" y1="755" x2="400" y2="775" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 11: Updated resources applied -->
  <circle cx="80" cy="798" r="16" fill="#3E8635"/>
  <text x="80" y="803" text-anchor="middle" fill="white" font-weight="700">11</text>
  <rect x="110" y="783" width="590" height="42" rx="8" fill="#E8F5E3" stroke="#3E8635" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="803" fill="#2D6B27" font-weight="600">Updated resources applied → CPU drops, replicas stabilize</text>
  <text x="130" y="819" fill="#3E8635" font-size="10">CPU 88%→55% • Replicas 10→6 • Phase: Fulfilled ✓</text>

  <!-- Final fulfilled -->
  <line x1="400" y1="825" x2="400" y2="845" stroke="#3E8635" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="280" y="845" width="240" height="30" rx="6" fill="#E8F5E3" stroke="#3E8635" stroke-width="2"/>
  <text x="400" y="865" text-anchor="middle" fill="#2D6B27" font-weight="700">Fulfilled ✓ (with updated config)</text>

  <!-- Escalation phase separator -->
  <line x1="40" y1="545" x2="810" y2="545" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- Timing annotations -->
  <text x="55" y="160" fill="#6753AC" font-size="10" font-weight="600">~30s</text>
  <text x="55" y="445" fill="#3E8635" font-size="10" font-weight="600">cont.</text>
  <text x="55" y="588" fill="#CC0000" font-size="10" font-weight="600">~30s</text>

  <text x="750" y="870" fill="#888" font-size="10">LLM calls: 2 (design time only)</text>
</svg>

apiVersion: an.openshift.io/v1alpha1
kind: ApplicationIntent
metadata:
  name: escalation-test
  namespace: poc-1-4
spec:
  target:
    deployment: sample-app
    namespace: poc-1-4
  objectives:
    - type: Latency
      metric: p99
      target: "50ms"
  constraints:
    minReplicas: 1
    maxReplicas: 5
    maxCPUPerPod: "500m"
    maxMemoryPerPod: "256Mi"
  autoApprove: false

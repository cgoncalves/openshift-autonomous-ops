apiVersion: batch/v1
kind: Job
metadata:
  name: heavy-load
  namespace: poc-1-4
spec:
  template:
    spec:
      containers:
        - name: load
          image: registry.access.redhat.com/ubi9/python-312:latest
          command:
            - python3
            - -c
            - |
              import urllib.request
              import concurrent.futures
              import time

              URL = "http://sample-app.poc-1-4.svc:8080/api/data"
              CONCURRENCY = 200
              DURATION = 300

              print(f"Heavy load: {CONCURRENCY} concurrent requests for {DURATION}s", flush=True)
              end = time.time() + DURATION
              total = 0
              with concurrent.futures.ThreadPoolExecutor(max_workers=CONCURRENCY) as executor:
                  while time.time() < end:
                      futures = [executor.submit(lambda: urllib.request.urlopen(URL, timeout=10)) for _ in range(CONCURRENCY)]
                      concurrent.futures.wait(futures)
                      total += CONCURRENCY
                      if total % 5000 == 0:
                          print(f"  {total} requests...", flush=True)
              print(f"Done. Total: {total}", flush=True)
      restartPolicy: Never
  backoffLimit: 0
